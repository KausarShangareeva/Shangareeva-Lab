<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHANGAREEVA LAB</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        color: #2c3e50;
      }

      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 60px 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      header h1 {
        font-size: 2.5em;
        font-weight: 700;
        margin-bottom: 15px;
        letter-spacing: 2px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      header p {
        font-size: 1.2em;
        opacity: 0.95;
        font-weight: 300;
        letter-spacing: 1px;
      }

      .products {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        padding: 60px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .product {
        background: white;
        padding: 25px;
        width: 280px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        text-align: center;
        overflow: hidden;
      }

      .product:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
      }

      .product img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 15px;
        transition: transform 0.3s ease;
      }

      .product:hover img {
        transform: scale(1.05);
      }

      .product h3 {
        font-size: 1.4em;
        margin-bottom: 10px;
        color: #667eea;
        font-weight: 600;
      }

      .product p {
        color: #7f8c8d;
        margin-bottom: 15px;
        font-size: 0.95em;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        margin-top: 15px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }

      button:active {
        transform: translateY(0);
      }

      .form {
        background: white;
        padding: 40px;
        margin: 40px auto;
        max-width: 500px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .form h2 {
        color: #667eea;
        margin-bottom: 25px;
        font-size: 1.8em;
        font-weight: 600;
      }

      #selectedProduct {
        color: #764ba2;
        font-weight: 600;
        margin-bottom: 20px;
        font-size: 1.05em;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1em;
        transition: all 0.3s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        background-color: #f8f9ff;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      @media (max-width: 768px) {
        header h1 {
          font-size: 1.8em;
        }

        header p {
          font-size: 1em;
        }

        .products {
          gap: 20px;
          padding: 40px 15px;
        }

        .product {
          width: 100%;
          max-width: 300px;
        }

        .form {
          margin: 20px;
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>SHANGAREEVA LAB</h1>
      <p>Маски, после которых не нужен крем</p>
    </header>

    <section class="products">
      <div class="product">
        <img src="mask1.jpg" />
        <h3>Hydra Calm Mask</h3>
        <p>Для сухой кожи</p>
        <button onclick="selectProduct('Hydra Calm Mask')">Выбрать</button>
      </div>

      <div class="product">
        <img src="mask2.jpg" />
        <h3>Pure Detox Mask</h3>
        <p>Для жирной кожи</p>
        <button onclick="selectProduct('Pure Detox Mask')">Выбрать</button>
      </div>

      <div class="product">
        <img src="mask3.jpg" />
        <h3>Balance Glow Mask</h3>
        <p>Для нормальной кожи</p>
        <button onclick="selectProduct('Balance Glow Mask')">Выбрать</button>
      </div>
    </section>

    <div class="form">
      <h2>Оформление заказа</h2>

      <p id="selectedProduct">Выберите продукт</p>

      <input type="text" id="name" placeholder="Ваше имя" />
      <input type="text" id="phone" placeholder="Телефон" />
      <textarea id="address" placeholder="Адрес доставки"></textarea>

      <button onclick="sendOrder()">Заказать через WhatsApp</button>
    </div>

    <script>
      let product = "";

      function selectProduct(p) {
          product = p;
          document.getElementById("selectedProduct").innerText = "Вы выбрали: " + p;
      }

      function sendOrder() {
          let name = document.getElementById("name").value;
          let phone = document.getElementById("phone").value;
          let address = document.getElementById("address").value;

          let message = `Новый заказ:
      Продукт: ${product}
      Имя: ${name}
      Телефон: ${phone}
      Адрес: ${address}`;

          let whatsappNumber = "905XXXXXXXXX"; // ВСТАВЬ СВОЙ НОМЕР

          let url = https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)};

          window.open(url, '_blank');
      }
    </script>
  </body>
</html>
